<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panther Wallet</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .points {
      font-size: 28px;
      font-weight: bold;
    }

    .muted {
      opacity: 0.6;
      font-size: 14px;
    }

    .btn {
      background: #00c853;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      color: #000;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    .error {
      color: #ff5252;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <div class="card">
      <div class="title">Tu progreso</div>
      <div id="points" class="points">--</div>
      <div id="level" class="muted"></div>
    </div>

    <div class="card">
      <div class="title">Acciones</div>
      <button class="btn" onclick="checkin()">Check-in diario</button>
    </div>

    <div id="error" class="error"></div>

  </div>

  <script>
    const API = "https://panther-bot-production-fd1f.up.railway.app";

    const tg = window.Telegram?.WebApp;
    let userId = null;

    // 🚀 INIT TELEGRAM
    if (tg) {
      tg.ready();
      tg.expand();

      const initData = tg.initData;

      if (initData) {
        const params = new URLSearchParams(initData);
        const userRaw = params.get("user");

        if (userRaw) {
          try {
            const user = JSON.parse(userRaw);
            userId = user.id;
          } catch (e) {
            console.error("Error parsing user", e);
          }
        }
      }
    }

    // 🔁 FALLBACK URL
    if (!userId) {
      const urlParams = new URLSearchParams(window.location.search);
      userId = urlParams.get("id");
    }

    // ❌ SIN ID
    if (!userId) {
      document.getElementById("error").innerText =
        "No se pudo identificar el usuario. Abrí desde el bot con /start.";
    } else {
      loadUser();
    }

    // 📥 CARGAR USUARIO
    async function loadUser() {
      try {
        const res = await fetch(`${API}/user?id=${userId}`);
        const data = await res.json();

        document.getElementById("points").innerText = data.points + " pts";
        document.getElementById("level").innerText = data.level;

      } catch (err) {
        document.getElementById("error").innerText = "Error cargando datos";
      }
    }

    // 🎯 CHECK-IN
    async function checkin() {
      try {
        const res = await fetch(`${API}/checkin?id=${userId}`);
        const data = await res.json();

        loadUser();

      } catch (err) {
        document.getElementById("error").innerText = "Error en check-in";
      }
    }
  </script>
</body>
</html>
