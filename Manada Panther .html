<script>
// ── API CONFIG ──
const API_BASE = 'https://go.mypanther.io';
let USER_ID = null;
let userData = null;

// 🔥 FIX REAL PARA BOTÓN AZUL
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;

  tg.ready();
  tg.expand();

  const initData = tg.initData;

  if (initData) {
    const params = new URLSearchParams(initData);
    const userStr = params.get('user');

    if (userStr) {
      try {
        const userObj = JSON.parse(userStr); // 🔥 sin decodeURIComponent
        if (userObj.id) {
          USER_ID = String(userObj.id);
        }
      } catch (e) {
        console.error('Error parsing Telegram user:', e);
      }
    }
  }
}

// fallback (no lo tocamos)
if (!USER_ID) {
  const urlParams = new URLSearchParams(window.location.search);
  const testId = urlParams.get('id');
  if (testId) USER_ID = testId;
}


// ── TODO LO DEMÁS IGUAL ──

// Load user data from API
async function loadUserData() {
  if (!USER_ID) {
    const ptsEl = document.querySelector('.pts-big');
    if(ptsEl) ptsEl.innerHTML = '? <span>pts</span>';
    const sub = document.querySelector('.pts-sub');
    if(sub) sub.textContent = 'Abrí desde el bot con /start';
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/user?id=${USER_ID}`);
    if (!res.ok) return;
    userData = await res.json();
    updateUI();
  } catch(e) {
    console.error('API error:', e);
  }
}
