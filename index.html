<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panther Wallet</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
}

#app {
  display: none;
  padding: 16px;
}

.card {
  background: #1c1c1c;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.points {
  font-size: 32px;
  font-weight: bold;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #00c853;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="splash">🐆 Panther</div>

<div id="app">
  <div class="card">
    <div>Tu progreso</div>
    <div id="points" class="points">--</div>
    <div id="level"></div>
  </div>

  <div class="card">
    <button class="btn" onclick="checkin()">Check-in diario</button>
  </div>

  <div id="error"></div>
</div>

<script>
const API = window.location.origin; // 🔥 usa mismo dominio

const tg = window.Telegram?.WebApp;
let userId = null;

// INIT TELEGRAM (FIX BOTÓN AZUL)
if (tg) {
  tg.ready();
  tg.expand();

  const initData = tg.initData;

  if (initData) {
    const params = new URLSearchParams(initData);
    const userStr = params.get('user');

    if (userStr) {
      try {
        const user = JSON.parse(userStr);
        userId = user.id;
      } catch (e) {}
    }
  }
}

// fallback
if (!userId) {
  const urlParams = new URLSearchParams(window.location.search);
  userId = urlParams.get("id");
}

// LOAD
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (userId) loadUser();
  else document.getElementById("error").innerText = "Abrí desde /start";
}, 1000);

// API
async function loadUser() {
  try {
    const res = await fetch(`${API}/user?id=${userId}`);
    const data = await res.json();

    document.getElementById("points").innerText = data.points + " pts";
    document.getElementById("level").innerText = data.level;

  } catch {
    document.getElementById("error").innerText = "Error cargando datos";
  }
}

async function checkin() {
  await fetch(`${API}/checkin?id=${userId}`);
  loadUser();
}
</script>

</body>
</html>
